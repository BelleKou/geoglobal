<!DOCTYPE html>
<html>
<head>
  <title>Geo Context Engine</title>
</head>
<body>
  <select id="country">
    <option value="">Auto (IP)</option>
    <option value="CN">China</option>
    <option value="US">United States</option>
    <option value="GB">United Kingdom</option>
    <option value="JP">Japan</option>
    <option value="DE">Germany</option>
    <option value="SG">Singapore</option>
    <option value="AU">Australia</option>
    <option value="CA">Canada</option>
  </select>
  <pre id="app">Loading...</pre>

  <script>
    const select = document.getElementById('country');
    select.value = localStorage.getItem('userCountry') || '';

    function load() {
      const override = select.value;
      localStorage.setItem('userCountry', override);
      const headers = override ? { 'X-User-Country': override } : {};
      fetch('/api', { headers })
        .then(r => r.json())
        .then(d => document.getElementById('app').innerText = JSON.stringify(d, null, 2));
    }

    select.addEventListener('change', load);
    load();
  </script>
</body>
</html>
